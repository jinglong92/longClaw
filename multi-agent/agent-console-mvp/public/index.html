<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Console MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="left">
        <div class="panel-title">会话 / Runs</div>
        <ul id="runList" class="run-list"></ul>
      </aside>

      <main class="center">
        <section class="overview-grid" id="overviewGrid">
          <div class="kpi-card"><div class="kpi-label">Agents</div><div class="kpi-value" id="kpiAgents">-</div></div>
          <div class="kpi-card"><div class="kpi-label">Runs</div><div class="kpi-value" id="kpiRuns">-</div></div>
          <div class="kpi-card"><div class="kpi-label">Risk Level</div><div class="kpi-value" id="kpiRisk">-</div></div>
          <div class="kpi-card"><div class="kpi-label">Latency P95</div><div class="kpi-value" id="kpiLatency">-</div></div>
        </section>

        <div class="panel-title center-topbar">
          <span>多代理控制台（CTRL 关系图）</span>
          <button id="controlConsoleToggle" class="console-toggle-btn" type="button">折叠</button>
        </div>
        <section id="controlConsolePanel" class="control-console">
          <div class="control-flow" id="controlFlowSummary">
            <span class="flow-node">User</span>
            <span class="flow-arrow">-></span>
            <span class="flow-node ctrl">CTRL</span>
            <span class="flow-arrow">-></span>
            <span class="flow-node" id="activeRouteNode">[LIFE]</span>
            <span class="flow-arrow">-></span>
            <span class="flow-node ctrl">CTRL</span>
            <span class="flow-arrow">-></span>
            <span class="flow-node">User</span>
          </div>
          <div class="control-subtitle">CTRL 与专职助理关系（可见层）</div>
          <div id="modeSummary" class="mode-summary"></div>
          <div id="specialistRelationGrid" class="specialist-relation-grid"></div>
        </section>

        <section class="chat-section">
          <div class="panel-title chat-title">会话窗口</div>
          <div id="chatStream" class="chat-stream"></div>
          <form id="chatForm" class="chat-input-wrap">
            <input id="chatInput" placeholder="输入消息，或 /pause run_001" autocomplete="off" />
            <button type="submit">发送</button>
          </form>
        </section>
      </main>

      <aside class="right">
        <div class="panel-title">运行控制</div>
        <div class="toolbar">
          <button data-action="pause">Pause</button>
          <button data-action="resume">Resume</button>
          <button data-action="cancel" class="danger">Cancel</button>
        </div>

        <div class="sub-title">节点（点击操作）</div>
        <div id="nodeList" class="node-list"></div>

        <div class="sub-title">今日时间线</div>
        <div id="todayTimeline" class="timeline-stream"></div>

        <div class="sub-title">Trace Runs</div>
        <div id="traceRunStream" class="trace-run-stream"></div>

        <div class="sub-title">实时日志</div>
        <div id="logStream" class="log-stream"></div>

        <div class="sub-title">隐藏层事件（Hidden）</div>
        <div id="hiddenEventStream" class="hidden-event-stream"></div>

        <div class="sub-title">评估摘要</div>
        <pre id="evaluationSummary" class="summary-box"></pre>

        <div class="sub-title">候选 vs 基线</div>
        <pre id="comparisonSummary" class="summary-box"></pre>
      </aside>
    </div>

    <script src="/app.js"></script>
  </body>
</html>

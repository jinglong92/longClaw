openapi: 3.0.3
info:
  title: Agent Console MVP API
  version: 0.1.0
paths:
  /api/runs:
    get:
      summary: List runs
      responses:
        "200": { description: OK }

  /api/messages:
    get:
      summary: List conversation messages
      responses:
        "200": { description: OK }

  /api/logs:
    get:
      summary: List logs
      responses:
        "200": { description: OK }

  /api/nodes:
    get:
      summary: List nodes
      responses:
        "200": { description: OK }

  /api/audit:
    get:
      summary: List audit records
      responses:
        "200": { description: OK }

  /api/events:
    get:
      summary: List structured runtime events
      parameters:
        - in: query
          name: actor_type
          schema: { type: string }
        - in: query
          name: run_id
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/traces:
    get:
      summary: List aggregated traces derived from events
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/evaluations:
    get:
      summary: List evaluator outputs
      responses:
        "200": { description: OK }

  /api/comparisons:
    get:
      summary: List candidate-vs-baseline comparison artifacts
      responses:
        "200": { description: OK }

  /api/replay:
    post:
      summary: Run offline replay from captured traces/events
      requestBody:
        required: false
      responses:
        "200": { description: OK }

  /api/chat:
    post:
      summary: Send chat message
      requestBody:
        required: true
      responses:
        "200": { description: OK }

  /api/runs/{runId}/pause:
    post:
      summary: Pause run
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/runs/{runId}/resume:
    post:
      summary: Resume run
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/runs/{runId}/cancel:
    post:
      summary: Cancel run
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/nodes/{nodeId}/retry:
    post:
      summary: Retry node
      parameters:
        - in: path
          name: nodeId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/nodes/{nodeId}/reroute:
    post:
      summary: Reroute node
      parameters:
        - in: path
          name: nodeId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
